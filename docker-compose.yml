version: '3.8'

services:
  # MySQL Database Container
  db:
    image: mysql:8.0
    container_name: accident_alert_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-accident_alert}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - accident-network

  # Laravel Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accident_alert_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-accident_alert}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      - db
    volumes:
      - ./backend:/var/www/html
    networks:
      - accident-network

  # React Frontend Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accident_alert_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - accident-network

networks:
  accident-network:
    driver: bridge

volumes:
  dbdata:
